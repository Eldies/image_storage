services:
  image_storage:
    build:
      context: .
      target: prod
    restart: always
    depends_on:
      create_access_key:
        condition: service_completed_successfully
    volumes:
      - ./app:/src/app
    environment:
      CLIENTS_INFO__0__api_key: api_key
      CLIENTS_INFO__0__id: client
      STORAGE__TYPE: s3
      STORAGE__S3__URL: http://minio:9000/
      STORAGE__S3__ACCESS_KEY: access-key
      STORAGE__S3__SECRET_KEY: secret-key
      STORAGE__S3__BUCKET: bucket
      SENTRY__DSN: ${SENTRY_DSN}
    ports:
      - 5000:5000

  minio:
    image: docker.io/bitnamilegacy/minio
    ports:
      - 9001:9001
    environment:
      MINIO_ROOT_USER: username
      MINIO_ROOT_PASSWORD: password
      MINIO_DEFAULT_BUCKETS: bucket
      MINIO_SCHEME: http
      BITNAMI_DEBUG: true

  create_access_key:
    image: minio/mc
    depends_on:
      - minio
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 username password || exit 1;
      mc admin user svcacct add myminio username --access-key access-key --secret-key secret-key || true;
      "
