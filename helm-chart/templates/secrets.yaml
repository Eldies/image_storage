apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-config
type: Opaque
stringData:
  SENTRY__DSN: {{ .Values.sentry.dsn }}
  STORAGE__TYPE: s3
  STORAGE__S3__URL: {{ .Values.storage.s3.url | quote }}
  STORAGE__S3__ACCESS_KEY: {{ .Values.storage.s3.access_key | quote }}
  STORAGE__S3__SECRET_KEY: {{ .Values.storage.s3.secret_key | quote }}
  STORAGE__S3__BUCKET: {{ .Values.storage.s3.bucket | quote }}

{{- if .Values.clientsInfo }}
{{- range $i, $client := .Values.clientsInfo }}
{{- $id := required (printf "clientsInfo[%d].id is required" $i) $client.id }}
{{- $apiKey := required (printf "clientsInfo[%d].apiKey is required" $i) $client.apiKey }}
  CLIENTS_INFO__{{ $i }}__id: {{ $id | quote }}
  CLIENTS_INFO__{{ $i }}__api_key: {{ $apiKey | quote }}
{{- end }}
{{- end }}
